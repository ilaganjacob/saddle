name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  client:
    name: Client (TypeScript + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build