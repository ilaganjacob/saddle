<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saddle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;display:flex;flex-direction:column;height:100vh}
header{padding:12px 16px;border-bottom:1px solid #21262d;font-size:14px;font-weight:600;color:#58a6ff;display:flex;justify-content:space-between}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#1f6feb;color:#fff}
.msg.agent{align-self:flex-start;background:#161b22;border:1px solid #30363d}
.tool-badge{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;background:#1f2937;color:#8b949e;margin-right:6px}
footer{padding:12px 16px;border-top:1px solid #21262d;display:flex;gap:8px}
#input{flex:1;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;outline:none}
#input:focus{border-color:#1f6feb}
#send{padding:10px 16px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer}
#send:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<header><span>Saddle</span><span id="status" style="color:#8b949e;font-size:12px"></span></header>
<div id="messages"></div>
<footer>
  <input id="input" type="text" placeholder="Type a message..." autofocus>
  <button id="send">Send</button>
</footer>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');
const status = document.getElementById('status');
let currentAgentMsg = null;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  send.disabled = true;
  status.textContent = 'Thinking...';
  addMsg('user', text);
  currentAgentMsg = addMsg('agent', '');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
    });

    if (!res.ok) {
      currentAgentMsg.textContent = 'HTTP ' + res.status;
      status.textContent = '';
      send.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const data = line.slice(6);
          try {
            const parsed = JSON.parse(data);
            if (eventType === 'delta') {
              currentAgentMsg.textContent += parsed;
            } else if (eventType === 'tool_start') {
              const badge = document.createElement('span');
              badge.className = 'tool-badge';
              badge.textContent = parsed;
              currentAgentMsg.appendChild(badge);
            } else if (eventType === 'tool_end') {
              // ignore for now
            } else if (eventType === 'error') {
              currentAgentMsg.textContent += '\n' + parsed;
            }
          } catch {
            // ignore parse failures
          }
          messages.scrollTop = messages.scrollHeight;
        }
      }
    }
  } catch (err) {
    if (currentAgentMsg) currentAgentMsg.textContent += '\n' + err.message;
  } finally {
    status.textContent = '';
    send.disabled = false;
    input.focus();
  }
}

send.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
